name: Test Audit
on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for tests
        run: |
          make test
