name: Test Audit
on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # ratchet:actions/checkout@v6

      - name: Check for tests
        run: |
          make test
