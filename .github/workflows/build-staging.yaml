name: "Staging: Release"

env:
  BINARY_NAME: "gemini-assisted-axum"

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  build_deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0

      # 1. Setup Rust
      # We use dtolnay's action because it's faster than rustup in CI
      - name: Setup Rust environment
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # ratchet:dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      # 2. Install Musl Tools (Required for your make build-alpine)
      - name: Install Musl Tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # 3. Build Binary & Prepare Config
      # We run the exact make commands so the ./build/app folder is created
      - name: Build Rust App
        id: build
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          git config --global url.git@github.com:.insteadOf https://github.com/

          # Install tools (sops/age) required for decryption
          make install-tools

          # Decrypt config (Creating ./etc/cfg/conf.json)
          make decrypt-conf-staging

          # Compile and move binary to ./build/app
          make build-alpine

      # 4. Versioning
      - name: Generate New Bumped Version
        uses: paulhatch/semantic-version@a8f8f59fd7f0625188492e945240f12d7ad2dca3 # ratchet:paulhatch/semantic-version@v5.4.0
        id: bump-semver
        with:
          version_format: "v${major}.${minor}.${patch}-rc.${increment}"
          bump_each_commit: false
          tag_prefix: "v"
          search_commit_body: true
          major_pattern: "(?!.*)"
          minor_pattern: "(?!.*)"

      - name: Save Version File
        run: echo "${{ steps.bump-semver.outputs.version }}" > version.txt

      # 5. Archive Binary for Release
      # We take the original named binary from target/, not the generic 'app' from build/
      - name: Archive Binary
        run: |
          RELEASE_ASSET_NAME="$BINARY_NAME-${{ steps.bump-semver.outputs.version }}-linux-musl.tar.gz"

          tar -czvf $RELEASE_ASSET_NAME -C ./target/x86_64-unknown-linux-musl/release $BINARY_NAME
          echo "ASSET_NAME=$RELEASE_ASSET_NAME" >> $GITHUB_ENV

      # 6. Docker Build & Push
      - name: Login to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # ratchet:docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        id: push-image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          VERSION: ${{ steps.bump-semver.outputs.version }}
        run: |
          LOWER_IMAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          FULL_IMAGE="$LOWER_IMAGE_NAME:$VERSION"

          # Note: We rely on step 3 having created ./build/app and ./etc/cfg/conf.json
          # Dockerfile context is '.' so it sees the ./build folder
          docker buildx build . -f ./utils/Dockerfile -t $FULL_IMAGE \
            --build-arg SERVICE_VERSION=$VERSION \
            --provenance false --push

          echo "docker_image=$FULL_IMAGE" >> "$GITHUB_OUTPUT"

      # Debugging Step: Verify what the Regex sees
      # - name: 🔍 Verify Label Extraction
      #   run: |
      #     # 1. Get the commit message
      #     MSG="${{ github.event.head_commit.message }}"
      #     echo "Testing Message: $MSG"

      #     # 2. Run a SED-compatible regex
      #     # Logic: Capture the first word ^([a-zA-Z0-9_]+) and ignore everything else .*
      #     EXTRACTED=$(echo "$MSG" | sed -nE 's/^([a-zA-Z0-9_]+).*/\1/p')

      #     echo "----------------------------------------"
      #     echo "✅ RAW INPUT:   $MSG"
      #     echo "✅ EXTRACTED:   $EXTRACTED"
      #     echo "----------------------------------------"

      #     # 3. Validation Logic
      #     if [[ "$EXTRACTED" == "chore" ]]; then
      #       echo "🎉 SUCCESS: It detected 'chore'!"
      #     elif [[ "$EXTRACTED" == "fix" ]]; then
      #       echo "🎉 SUCCESS: It detected 'fix'!"
      #     elif [[ "$EXTRACTED" == "feat" ]]; then
      #       echo "🎉 SUCCESS: It detected 'feat'!"
      #     else
      #       echo "⚠️  NOTE: It extracted '$EXTRACTED'. Ensure this matches one of your categories."
      #     fi

      # 7. Generate Tidy Changelog
      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@439f79b5b5428107c7688c1d2b0e8bacc9b8792c # ratchet:mikepenz/release-changelog-builder-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          toTag: ${{ github.sha }}

          configurationJson: |
            {
              "pr_template": "- #{{TITLE}} [[#{{NUMBER}}](#{{URL}})]",
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test){1}(\\([\\w\\-\\.]+\\))?(!)?: ([\\w ])+([\\s\\S]*)",
                  "on_property": "title",
                  "target": "$1"
                }
              ],
              "categories": [
                {
                  "title": "## 🚀 Features",
                  "labels": ["feature", "Feature", "feat", "Feat"]
                },
                {
                  "title": "## 🐛 Fixes",
                  "labels": ["fix", "Fix", "bug", "Bug"]
                },
                {
                  "title": "## 🧹 Chores",
                  "labels": ["chore", "Chore"]
                },
                {
                  "title": "## 📦 Other Changes",
                  "labels": []
                }
              ]
            }

      # 8. Create Release
      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # ratchet:softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump-semver.outputs.version }}
          name: ${{ steps.bump-semver.outputs.new_version }}
          prerelease: true
          body: |
            ${{ steps.build_changelog.outputs.changelog }}

            ---
            ### 🐳 Docker Image
            ```bash
            docker pull ${{ steps.push-image.outputs.docker_image }}
            ```
          files: |
            version.txt
            ${{ env.ASSET_NAME }}
