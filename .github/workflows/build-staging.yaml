name: "Staging: Release"

env:
  BINARY_NAME: "gemini-assisted-axum"

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  build_deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # 1. Setup Rust
      # We use dtolnay's action because it's faster than rustup in CI
      - name: Setup Rust environment
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # ratchet:dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      # 2. Install Musl Tools (Required for your make build-alpine)
      - name: Install Musl Tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # 6.5. [NEW] Find the Last Stable Release (v0.2.0)
      - name: Find Latest Stable Tag
        id: stable_tag
        run: |
          # 1. Fetch tags (ensure we have the full list)
          git fetch --tags --force

          # 2. Find the latest tag that starts with 'v' and has NO hyphens (no -rc)
          # --sort=-v:refname  : Sorts by version (highest first)
          # grep -v "-"        : Removes any tag with a hyphen (rc, beta, alpha)
          # head -n 1          : Takes the top one
          LATEST_STABLE=$(git tag --sort=-v:refname | grep "^v[0-9]" | grep -v "-" | head -n 1)

          # 3. Handle case where NO stable tags exist yet
          if [ -z "$LATEST_STABLE" ]; then
              echo "No stable tag found. Defaulting to empty (start of history)."
              echo "tag=" >> $GITHUB_OUTPUT
          else
              echo "Found stable tag: $LATEST_STABLE"
              echo "tag=$LATEST_STABLE" >> $GITHUB_OUTPUT
          fi

      # 3. Build Binary & Prepare Config
      # We run the exact make commands so the ./build/app folder is created
      - name: Build Rust App
        id: build
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          git config --global url.git@github.com:.insteadOf https://github.com/

          # Install tools (sops/age) required for decryption
          make install-tools

          # Decrypt config (Creating ./etc/cfg/conf.json)
          make decrypt-conf-staging

          # Compile and move binary to ./build/app
          make build-alpine

      # 4. Versioning
      - name: Generate New Bumped Version
        uses: paulhatch/semantic-version@a8f8f59fd7f0625188492e945240f12d7ad2dca3 # ratchet:paulhatch/semantic-version@v5.4.0
        id: bump-semver
        with:
          version_format: "v${major}.${minor}.${patch}-rc.${increment}"
          tag_prefix: "v"
          search_commit_body: true
          major_pattern: "/!:|BREAKING CHANGE/"
          minor_pattern: "/feat|feature/"

      - name: Save Version File
        run: echo "${{ steps.bump-semver.outputs.version }}" > version.txt

      # 5. Archive Binary for Release
      # We take the original named binary from target/, not the generic 'app' from build/
      - name: Archive Binary
        run: |
          RELEASE_ASSET_NAME="$BINARY_NAME-${{ steps.bump-semver.outputs.version }}-linux-musl.tar.gz"

          tar -czvf $RELEASE_ASSET_NAME -C ./target/x86_64-unknown-linux-musl/release $BINARY_NAME
          echo "ASSET_NAME=$RELEASE_ASSET_NAME" >> $GITHUB_ENV

      # 6. Docker Build & Push
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        id: push-image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          VERSION: ${{ steps.bump-semver.outputs.version }}
        run: |
          LOWER_IMAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          FULL_IMAGE="$LOWER_IMAGE_NAME:$VERSION"

          # Note: We rely on step 3 having created ./build/app and ./etc/cfg/conf.json
          # Dockerfile context is '.' so it sees the ./build folder
          docker buildx build . -f ./utils/Dockerfile -t $FULL_IMAGE \
            --build-arg SERVICE_VERSION=$VERSION \
            --provenance false --push

          echo "docker_image=$FULL_IMAGE" >> "$GITHUB_OUTPUT"

      # 7. Generate Tidy Changelog
      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@6faf020194b7c8853f9e55c4fd92e40b02122a04 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fromTag: ${{ steps.stable_tag.outputs.tag }}
          toTag: ${{ github.sha }}

          configurationJson: |
            {
              "pr_template": "- #{{TITLE}} [[#{{NUMBER}}](#{{URL}})]",
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci/cd|docs|feat|fix|perf|refactor|revert|style|test){1}(\\([\\w\\-\\.]+\\))?(!)?: ([\\w ])+([\\s\\S]*)",
                  "on_property": "title",
                  "target": "$1"
                }
              ],
              "categories": [
                {
                  "title": "## 🚀 Features",
                  "labels": ["feature", "Feature", "feat", "Feat"]
                },
                {
                  "title": "## 🐛 Fixes",
                  "labels": ["fix", "Fix", "bug", "Bug"]
                },
                {
                  "title": "## 🧹 Chores",
                  "labels": ["chore", "Chore"]
                },
                {
                  "title": "## ⚙️ CI/CD",
                  "labels": ["ci/cd", "CI/CD"]
                },
                {
                  "title": "## 📝 Docs",
                  "labels": ["docs", "Docs"]
                },
                {
                  "title": "## ♻️ Refactor",
                  "labels": ["refactor", "Refactor"]
                },
                {
                  "title": "## 🧪 Test",
                  "labels": ["test", "Test"]
                },
                {
                  "title": "## 📦 Other Changes",
                  "labels": []
                }
              ]
            }

      # 8. Create Release
      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # ratchet:softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump-semver.outputs.version }}
          name: ${{ steps.bump-semver.outputs.new_version }}
          prerelease: true
          body: |
            ${{ steps.build_changelog.outputs.changelog }}

            ---
            ### 🐳 Docker Image
            ```bash
            docker pull ${{ steps.push-image.outputs.docker_image }}
            ```
          files: |
            version.txt
            ${{ env.ASSET_NAME }}
