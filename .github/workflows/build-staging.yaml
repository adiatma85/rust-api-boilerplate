name: "Staging: Release"

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  build_deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0

      # 1. Setup Rust
      # We use dtolnay's action because it's faster than rustup in CI
      - name: Setup Rust environment
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # ratchet:dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      # 2. Install Musl Tools (Required for your make build-alpine)
      - name: Install Musl Tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # 3. Build Binary & Prepare Config
      # We run the exact make commands so the ./build/app folder is created
      - name: Build Rust App
        id: build
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          git config --global url.git@github.com:.insteadOf https://github.com/

          # Install tools (sops/age) required for decryption
          make install-tools

          # Decrypt config (Creating ./etc/cfg/conf.json)
          make decrypt-conf-staging

          # Compile and move binary to ./build/app
          make build-alpine

      # 4. Versioning
      - name: Get Latest Tag
        id: latest-tag
        run: |
          git config --global --add safe.directory /github/workspace
          echo "tag=$(git tag -l | sed '/-/!{s/$/_/;}' | sort -V | sed 's/_$//' | tail -1)" >> "$GITHUB_OUTPUT"

      - name: Generate New Bumped Version
        uses: DelosAqua/action-bump-semver@557bede145fab753bb171f168ad7385981f9f0e3 # ratchet:DelosAqua/action-bump-semver@v1.1.0
        id: bump-semver
        with:
          current_version: ${{ steps.latest-tag.outputs.tag }}
          level: prerelease
          preid: rc

      - name: Save Version File
        run: echo "${{ steps.bump-semver.outputs.new_version }}" > version.txt

      # 5. Archive Binary for Release
      # We take the original named binary from target/, not the generic 'app' from build/
      - name: Archive Binary
        run: |
          BINARY_NAME="gemini-assisted-axum"
          RELEASE_ASSET_NAME="$BINARY_NAME-${{ steps.bump-semver.outputs.new_version }}-linux-musl.tar.gz"

          # Create a tarball containing the binary
          tar -czvf $RELEASE_ASSET_NAME -C ./target/x86_64-unknown-linux-musl/release $BINARY_NAME

          echo "ASSET_NAME=$RELEASE_ASSET_NAME" >> $GITHUB_ENV

      # 6. Docker Build & Push
      - name: Login to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # ratchet:docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        id: push-image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          VERSION: ${{ steps.bump-semver.outputs.new_version }}
        run: |
          LOWER_IMAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          FULL_IMAGE="$LOWER_IMAGE_NAME:$VERSION"

          # Note: We rely on step 3 having created ./build/app and ./etc/cfg/conf.json
          # Dockerfile context is '.' so it sees the ./build folder
          docker buildx build . -f ./utils/Dockerfile -t $FULL_IMAGE \
            --build-arg SERVICE_VERSION=$VERSION \
            --provenance false --push

          echo "docker_image=$FULL_IMAGE" >> "$GITHUB_OUTPUT"

      # Get the branch name
      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@dde14ac574a8b9b1cedc59a1cf312788af43d8d8 # ratchet:tj-actions/branch-names@v8

      #  Build Changelog
      - name: Create Release Notes
        uses: DelosAqua/upload-release-action@d451dbb3c0a76fed831d9cfd04202be60a97acd3 # ratchet:DelosAqua/upload-release-action@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.bump-semver.outputs.new_version }}
          release_name: ${{ steps.bump-semver.outputs.new_version }}
          file: version.txt
          prerelease: true
          make_latest: false
          target_commit: ${{ steps.branch-name.outputs.current_branch }}
          generate_release_notes: true
