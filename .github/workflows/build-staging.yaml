name: "Staging: Release"

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: read # Required for the changelog builder to read PR details

jobs:
  build_deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Setup Rust
      - name: Setup Rust environment
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      # 2. Install Tools
      - name: Install Musl Tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # 3. Build Binary
      - name: Build Rust App
        id: build
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          git config --global url.git@github.com:.insteadOf https://github.com/
          make install-tools
          make decrypt-conf-staging
          make prepare
          make build-alpine

          # TIP: Assuming your binary is named after your repo or defined in Cargo.toml.
          # We'll find it in the target directory.
          echo "BINARY_PATH=$(find target/x86_64-unknown-linux-musl/release -maxdepth 1 -type f -executable | head -n 1)" >> $GITHUB_ENV

      # 4. Versioning
      - name: Get Latest Tag
        id: latest-tag
        run: |
          git config --global --add safe.directory /github/workspace
          echo "tag=$(git tag -l | sed '/-/!{s/$/_/;}' | sort -V | sed 's/_$//' | tail -1)" >> "$GITHUB_OUTPUT"

      - name: Generate New Bumped Version
        uses: DelosAqua/action-bump-semver@v1.1.0
        id: bump-semver
        with:
          current_version: ${{ steps.latest-tag.outputs.tag }}
          level: prerelease
          preid: rc

      - name: Save Version File
        run: echo "${{ steps.bump-semver.outputs.new_version }}" > version.txt

      # 5. Archive the Binary for Release (Opinion: Highly Recommended)
      - name: Archive Binary
        run: |
          # Compress the binary found in step 3 to make it easy to download
          tar -czvf my-app-linux-musl.tar.gz -C $(dirname ${{ env.BINARY_PATH }}) $(basename ${{ env.BINARY_PATH }})

      # 6. Docker Build & Push
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        id: push-image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          VERSION: ${{ steps.bump-semver.outputs.new_version }}
        run: |
          LOWER_IMAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          FULL_IMAGE="$LOWER_IMAGE_NAME:$VERSION"

          # Build and push
          docker buildx build . -f ./utils/Dockerfile -t $FULL_IMAGE \
            --build-arg SERVICE_VERSION=$VERSION \
            --provenance false --push

          echo "docker_image=$FULL_IMAGE" >> "$GITHUB_OUTPUT"

      # 7. Generate Tidy Changelog (Fixes the "Long Link" issue)
      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # This mode automatically groups PRs by labels (feature, fix, chore)
          # and formats links as #123 instead of full URLs.
          mode: "COMMIT"

      # 8. Create Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bump-semver.outputs.new_version }}
          name: ${{ steps.bump-semver.outputs.new_version }}
          prerelease: true
          # Here we combine the Tidy Changelog + The Docker Link
          body: |
            ${{ steps.build_changelog.outputs.changelog }}

            ---
            ### 🐳 Docker Image
            Run this specific version:
            ```bash
            docker pull ${{ steps.push-image.outputs.docker_image }}
            ```
          files: |
            version.txt
            my-app-linux-musl.tar.gz
