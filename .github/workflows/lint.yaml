name: Linter Audit
on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for Lint and Unpinned GitHub Actions
        run: |
          make ensure-bin-dir
          make install-ratchet
          make lint
